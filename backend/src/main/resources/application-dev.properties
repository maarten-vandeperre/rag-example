%dev.quarkus.profile=dev
%dev.quarkus.http.port=8081
%dev.quarkus.http.host=0.0.0.0
# Disable OIDC for development mode to allow mock tokens
%dev.quarkus.oidc.tenant-enabled=false

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=rag_dev_user
%dev.quarkus.datasource.password=rag_dev_password
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/rag_app_dev
%dev.quarkus.datasource.jdbc.max-size=20
%dev.quarkus.datasource.jdbc.min-size=5
%dev.quarkus.flyway.migrate-at-start=false
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.sql-load-script=no-file

# Development mode - disable authentication for easier testing
%dev.quarkus.http.auth.permission.options.paths=/api/*
%dev.quarkus.http.auth.permission.options.policy=permit
%dev.quarkus.http.auth.permission.options.methods=OPTIONS
%dev.quarkus.http.auth.permission.all-api.paths=/api/*
%dev.quarkus.http.auth.permission.all-api.policy=permit
%dev.quarkus.http.auth.permission.health.paths=/q/health/*
%dev.quarkus.http.auth.permission.health.policy=permit

%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:3000,http://127.0.0.1:3000
%dev.quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-user-id,x-debug-client,cache-control,pragma
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
%dev.quarkus.http.cors.exposed-headers=*
%dev.quarkus.http.cors.access-control-max-age=86400
%dev.quarkus.http.cors.access-control-allow-credentials=true

%dev.quarkus.security.users.embedded.enabled=false
# Disable JWT verification for development mode
# %dev.mp.jwt.verify.publickey.location=http://localhost:8180/realms/rag-app-dev/protocol/openid-connect/certs

%dev.app.vectorstore.provider=weaviate
%dev.app.vectorstore.url=http://localhost:8080
%dev.app.vectorstore.api-key=
%dev.app.vectorstore.timeout=30000
%dev.app.vectorstore.batch-size=100
%dev.app.vector.dimension=384
%dev.app.vector.similarity-threshold=0.2
%dev.app.vector.max-results=10
%dev.app.embedding.provider=sentence-transformers
%dev.app.embedding.model=all-MiniLM-L6-v2
%dev.app.embedding.batch-size=32

%dev.app.llm.provider=ollama
%dev.app.llm.url=http://localhost:11434
%dev.app.llm.model=tinyllama
%dev.app.llm.timeout=60000
%dev.app.llm.max-tokens=512
%dev.app.llm.temperature=0.1
%dev.app.llm.retry-count=2
%dev.app.llm.retry-delay-ms=1000

%dev.quarkus.redis.hosts=redis://localhost:6379
%dev.quarkus.redis.timeout=10s

%dev.app.graphstore.provider=neo4j
%dev.app.graphstore.uri=bolt://localhost:7687
%dev.app.graphstore.username=neo4j
%dev.app.graphstore.password=dev-password
%dev.app.graphstore.database=neo4j

%dev.app.storage.documents.path=./storage/documents
%dev.app.storage.max-file-size=41943040

%dev.quarkus.log.level=INFO
%dev.quarkus.log.category."com.rag.app".level=DEBUG
%dev.quarkus.log.category."org.hibernate.SQL".level=DEBUG
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

%dev.quarkus.live-reload.instrumentation=true
%dev.quarkus.dev.instrumentation=true
%dev.quarkus.swagger-ui.always-include=true
%dev.quarkus.smallrye-openapi.info-title=RAG Application API (Development)
%dev.quarkus.smallrye-openapi.info-version=1.0.0-dev
%dev.quarkus.smallrye-health.root-path=/q/health
%dev.quarkus.smallrye-health.liveness-path=/q/health/live
%dev.quarkus.smallrye-health.readiness-path=/q/health/ready

version: '3.8'

services:
  postgres-dev:
    image: pgvector/pgvector:pg15
    container_name: rag-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rag_app_dev}
      POSTGRES_USER: ${DB_USER:-rag_dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rag_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./infrastructure/database/init-dev.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infrastructure/database/sample-dev-data.sql:/docker-entrypoint-initdb.d/02-sample-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rag_dev_user} -d ${DB_NAME:-rag_app_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rag-dev-network

  weaviate-dev:
    image: semitechnologies/weaviate:1.22.4
    container_name: rag-weaviate-dev
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    environment:
      QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_LIMIT:-25}
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      ASYNC_INDEXING: 'true'
      ENABLE_MODULES: ${WEAVIATE_ENABLED_MODULES:-}
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
    volumes:
      - weaviate_dev_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - rag-dev-network

  keycloak-dev:
    image: quay.io/keycloak/keycloak:23.0
    container_name: rag-keycloak-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-dev:5432/${DB_NAME:-rag_app_dev}
      KC_DB_USERNAME: ${DB_USER:-rag_dev_user}
      KC_DB_PASSWORD: ${DB_PASSWORD:-rag_dev_password}
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_FEATURES_DISABLED: impersonation
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - keycloak_dev_data:/opt/keycloak/data
      - ./infrastructure/keycloak/dev-realm.json:/opt/keycloak/data/import/dev-realm.json:ro
    command:
      - start-dev
      - --import-realm
    depends_on:
      postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\r\nhost: 127.0.0.1:8080\r\nConnection: close\r\n\r\n' >&3; grep 'HTTP/1.1 200' <&3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - rag-dev-network

  redis-dev:
    image: redis:7-alpine
    container_name: rag-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - rag-dev-network

  ollama-dev:
    image: ollama/ollama:latest
    container_name: rag-ollama-dev
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_dev_models:/root/.ollama
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    profiles:
      - llm
    networks:
      - rag-dev-network

volumes:
  postgres_dev_data:
    driver: local
  weaviate_dev_data:
    driver: local
  keycloak_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  ollama_dev_models:
    driver: local

networks:
  rag-dev-network:
    driver: bridge

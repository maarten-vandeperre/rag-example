version: '3.8'

services:
  postgres-dev:
    image: pgvector/pgvector:pg15
    container_name: rag-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rag_app_dev}
      POSTGRES_USER: ${DB_USER:-rag_dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rag_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./infrastructure/database/init-dev.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infrastructure/database/sample-dev-data.sql:/docker-entrypoint-initdb.d/02-sample-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rag_dev_user} -d ${DB_NAME:-rag_app_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rag-dev-network

  weaviate-dev:
    image: semitechnologies/weaviate:1.22.4
    container_name: rag-weaviate-dev
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
      ASYNC_INDEXING: 'true'
      LOG_LEVEL: 'info'
    ports:
      - "8080:8080"
    volumes:
      - weaviate_dev_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:8080/v1/meta"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rag-dev-network

  keycloak-dev:
    image: quay.io/keycloak/keycloak:23.0
    container_name: rag-keycloak-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-dev:5432/${DB_NAME:-rag_app_dev}
      KC_DB_USERNAME: ${DB_USER:-rag_dev_user}
      KC_DB_PASSWORD: ${DB_PASSWORD:-rag_dev_password}
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      KC_FEATURES_DISABLED: impersonation
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - keycloak_dev_data:/opt/keycloak/data
      - ./infrastructure/keycloak/dev-realm.json:/opt/keycloak/data/import/dev-realm.json:ro
    command:
      - start-dev
      - --import-realm
    depends_on:
      postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /health/ready HTTP/1.1\r\nhost: 127.0.0.1:8080\r\nConnection: close\r\n\r\n' >&3; grep 'HTTP/1.1 200' <&3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - rag-dev-network

  redis-dev:
    image: redis:7-alpine
    container_name: rag-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - rag-dev-network

  neo4j-dev:
    image: neo4j:5.26-community
    container_name: rag-neo4j-dev
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dev-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: localhost:${NEO4J_BOLT_PORT:-7687}
      NEO4J_server_http_advertised__address: localhost:${NEO4J_HTTP_PORT:-7474}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512M}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-256M}
      NEO4J_db_tx__log_rotation_retention__policy: 1 files
      NEO4J_server_logs_gc_enabled: 'true'
      NEO4J_apoc_export_file_enabled: 'true'
      NEO4J_apoc_import_file_enabled: 'true'
      NEO4J_initial_dbms_default__database: ${NEO4J_DATABASE:-neo4j}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_dev_data:/data
      - neo4j_dev_logs:/logs
      - neo4j_dev_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p \"${NEO4J_PASSWORD:-dev-password}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      - rag-dev-network

  ollama-dev:
    image: ollama/ollama:latest
    container_name: rag-ollama-dev
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_dev_models:/root/.ollama
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    profiles:
      - llm
    networks:
      - rag-dev-network

volumes:
  postgres_dev_data:
    driver: local
  weaviate_dev_data:
    driver: local
  keycloak_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  ollama_dev_models:
    driver: local
  neo4j_dev_data:
    driver: local
  neo4j_dev_logs:
    driver: local
  neo4j_dev_plugins:
    driver: local

networks:
  rag-dev-network:
    driver: bridge
